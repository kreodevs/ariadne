server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: todas las rutas sirven index.html para client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache estático para assets con hash
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Tarball MCP para npx (sin cache largo para que redeploys actualicen)
    location /mcp/ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }
}
